name: Build and Release Binaries

on:
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Build command for Windows (uses ';' as paths separator)
      - name: Build Windows Executable
        if: matrix.os == 'windows-latest'
        run: |
          python -m PyInstaller --onefile --windowed --name "Ashtavadhani" --add-data "static;static" --add-data "index.html;." --collect-all moviepy --collect-all imageio launcher.py

      # Build command for Linux (uses ':' as paths separator)
      - name: Build Linux Binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m PyInstaller --onefile --name "Ashtavadhani-linux" --add-data "static:static" --add-data "index.html:." --collect-all moviepy --collect-all imageio launcher.py

      # Upload files directly to the GitHub Release page
      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || 'v1.0.0' }}
          files: |
            dist/Ashtavadhani.exe
            dist/Ashtavadhani-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
